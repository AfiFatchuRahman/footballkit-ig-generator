<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&family=Monoton&family=Dancing+Script:wght@600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    .font-script { font-family: 'Dancing Script', cursive; }
    .font-outline { font-family: 'Monoton', cursive; }
    .font-mono { font-family: 'Space Mono', monospace; }

    /* subtle grain */
    .grain::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/noise.png");
      opacity: 0.08;
      pointer-events: none;
    }

    /* neon red line */
    .neon-red {
      box-shadow: 0 0 6px rgba(255,0,0,0.6);
    }

    /* white glow */
    .glow-white {
      text-shadow: 0 0 8px rgba(255,255,255,0.7);
    }
  </style>

  <title>Futuristic Cover</title>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- 📦 CONTAINER 4:5 -->
  <div class="relative w-full max-w-md aspect-[4/5] overflow-hidden grain">

    <!-- 🖼️ BACKGROUND -->
    <img 
      src="https://picsum.photos/800/1000"
      class="absolute inset-0 w-full h-full object-cover"
    />

    <!-- 🌑 VERTICAL VIGNETTE -->
    <div class="absolute inset-0 
      bg-gradient-to-t 
      from-black 
      via-black/70 
      via-black/30 
      to-transparent">
    </div>
    
<!-- 🟡 TOP LINE (2/3 dari kanan ke kiri) -->
<div class="absolute top-4 right-4 w-[25%] h-[0.5px] 
  bg-[#d4af37] shadow-[0_0_6px_rgba(212,175,55,0.6)]">
</div>

<!-- 🟡 RIGHT LINE (2/3 dari atas ke bawah) -->
<div class="absolute top-4 right-4 h-[30%] w-[0.5px] 
  bg-[#d4af37] shadow-[0_0_6px_rgba(212,175,55,0.6)]">
</div>

        
<!-- 🟡 TOP LINE (2/3 dari kanan ke kiri) -->
<div class="absolute bottom-4 left-4 w-[25%] h-[0.5px] 
  bg-[#d4af37] shadow-[0_0_6px_rgba(212,175,55,0.6)]">
</div>

<!-- 🟡 RIGHT LINE (2/3 dari atas ke bawah) -->
<div class="absolute bottom-4 left-4 h-[30%] w-[0.5px] 
  bg-[#d4af37] shadow-[0_0_6px_rgba(212,175,55,0.6)]">
</div>
    
    <!-- 🔷 TOP LOGO -->
    <!--<div class="absolute top-6 left-1/2 -translate-x-1/2 text-white glow-white">
      <div class="w-6 h-6 border border-white rotate-45"></div>
    </div>-->

    <!-- ✍️ CENTER TEXT -->
    <div class="absolute inset-0 flex flex-col items-center justify-center text-center text-white px-6">

      <!-- script -->
      <p class="font-script text-xl mb-2 glow-white">
        The
      </p>

      <!-- outline big -->
      <h1 class="font-mono text-4xl md:text-5xl leading-tight">
        JERSEY<br/>
        SCOUT
      </h1>

    </div>

    <!-- 🔻 BOTTOM LABEL -->
    <div class="absolute bottom-9 left-1/2 -translate-x-1/2 text-center text-white">

      <div class="flex items-center gap-3 justify-center">

        <!-- diamond -->
        <div class="w-2 h-2 bg-[#d4af37] rotate-45 shadow-[0_0_6px_rgba(255,165,0,0.8)]"></div>

        <!-- text -->
        <p class="font-mono text-[11px] tracking-widest">
          Liverpool FC
        </p>

        <!-- diamond -->
        <div class="w-2 h-2 bg-[#d4af37] rotate-45 shadow-[0_0_6px_rgba(255,165,0,0.8)]"></div>

      </di
        v>

    </div>

  </div>

</body>
</html>
