<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Kit Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0a0a;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

/* HEADER */
.header{
  padding:16px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #1a1a1a;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:8px;
  padding:10px;
  justify-content:center;
  flex-wrap:wrap;
}

.controls input{
  background:#111;
  border:1px solid #222;
  color:#fff;
  padding:8px;
  border-radius:8px;
}

.controls button{
  background:#fff;
  color:#000;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

/* SLIDE WRAPPER */
.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
  padding:30px 0;
}

/* SLIDE (FIXED IG SIZE) */
.slide{
  width:320px;
  height:320px;
  background:#111;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

/* HERO */
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.hero-title{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:22px;
  font-weight:700;
}

/* DETAILS GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  width:100%;
  height:100%;
}

.grid div{
  position:relative;
}

.grid img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.grid span{
  position:absolute;
  bottom:6px;
  left:6px;
  font-size:10px;
  background:rgba(0,0,0,.6);
  padding:2px 4px;
  border-radius:4px;
}

/* PLAYER */
.player img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.player span{
  position:absolute;
  bottom:10px;
  left:10px;
  font-size:12px;
  background:rgba(0,0,0,.6);
  padding:4px 6px;
  border-radius:6px;
}

/* TEXT SLIDES */
.text{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}

.big{
  font-size:26px;
  font-weight:700;
}

.small{
  margin-top:10px;
  font-size:14px;
  opacity:.7;
}
</style>
</head>

<body>

<div class="header">footballkitcircle</div>

<div class="controls">
  <input id="team" placeholder="Liverpool">
  <input id="year" placeholder="2008">
  <input type="file" id="upload" multiple>
  <button onclick="generate()">Generate</button>
  <button onclick="downloadAll()">Download</button>
</div>

<div class="wrapper" id="slides"></div>

<script>
let images=[];

const dummy=[
  "https://images.unsplash.com/photo-1521417531039-8c1b6b9c1f8d",
  "https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a",
  "https://images.unsplash.com/photo-1508098682722-e99c643e7f0b",
  "https://images.unsplash.com/photo-1522778119026-d647f0596c20"
];

document.getElementById("upload").addEventListener("change",e=>{
  images=[];
  for(let f of e.target.files){
    images.push(URL.createObjectURL(f));
  }
});

function getImgs(){
  return images.length?images:dummy;
}

/* SLIDES */

function slide1(team,year){
  return `
  <div class="slide hero">
    <img src="${getImgs()[0]}">
    <div class="hero-title">${team} ${year}</div>
  </div>`;
}

function slide2(){
  const labels=["Badge","Sponsor","Nameset","Patch"];
  return `
  <div class="slide grid">
    ${getImgs().slice(0,4).map((i,idx)=>`
      <div>
        <img src="${i}">
        <span>${labels[idx]}</span>
      </div>
    `).join("")}
  </div>`;
}

function slide3(){
  return `
  <div class="slide player">
    <img src="${getImgs()[1]}">
    <span>Key Player</span>
  </div>`;
}

function slideText(title,sub){
  return `
  <div class="slide text">
    <div class="big">${title}</div>
    <div class="small">${sub}</div>
  </div>`;
}

function generate(){
  const team=document.getElementById("team").value||"Liverpool";
  const year=document.getElementById("year").value||"2008";

  document.getElementById("slides").innerHTML=`
    ${slide1(team,year)}
    ${slide2()}
    ${slide3()}
    ${slideText("Competitions","Premier League • UCL • FA Cup")}
    ${slideText("Achievements","86 Points • Runner Up")}
    ${slideText("Fun Facts","Iconic Benitez era")}
  `;
}

function downloadAll(){
  document.querySelectorAll(".slide").forEach((s,i)=>{
    html2canvas(s).then(c=>{
      const a=document.createElement("a");
      a.href=c.toDataURL();
      a.download=`slide-${i+1}.png`;
      a.click();
    });
  });
}
</script>

</body>
</html>
