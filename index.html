<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Poppins', sans-serif; }
  </style>

  <title>Editorial Fashion</title>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <div class="relative w-full max-w-md aspect-[4/5] overflow-hidden group">

    <!-- IMAGE (FIXED SOURCE) -->
    <img 
      src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=800&q=80"
      class="w-full h-full object-cover transition-all duration-700 ease-out opacity-0 group-hover:scale-105"
      onload="this.classList.remove('opacity-0')"
    />

    <!-- GRADIENT -->
    <div class="absolute inset-0 bg-gradient-to-tr from-black/60 via-black/20 to-transparent"></div>

    <!-- TEXT -->
    <div class="absolute bottom-0 left-0 p-8 text-white">
      <p class="text-[8px] tracking-[0.3em] opacity-80 mb-3">
        THE JERSEY SCOUT
      </p>

      <h1 class="font-display font-extrabold text-2xl leading-tight tracking-tight">
        MODERN<br/>
        FOOTBALL
      </h1>
    </div>

    <!-- MUTE -->
    <div class="absolute bottom-4 right-4 bg-black/40 backdrop-blur-sm rounded-full p-2">
      <svg xmlns="http://www.w3.org/2000/svg" 
           class="w-4 h-4 text-white opacity-90" 
           fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
          d="M9 9l6 6m0-6l-6 6M15 9v6M9 9v6" />
      </svg>
    </div>

  </div>

</body>
</html>
