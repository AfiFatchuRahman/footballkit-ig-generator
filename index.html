<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    .grain::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/noise.png");
      opacity: 0.06;
      pointer-events: none;
    }
  </style>

  <title>CTA Slide</title>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- 📦 CONTAINER -->
  <div class="relative w-full max-w-md aspect-[4/5] overflow-hidden text-white grain">

    <!-- 🖼️ BG -->
    <img 
      src="https://picsum.photos/800/1000?grayscale"
      class="absolute inset-0 w-full h-full object-cover"
    />

    <!-- 🌑 GRADIENT -->
    <div class="absolute bottom-0 left-0 w-full h-[65%] 
      bg-gradient-to-t 
      from-black 
      via-black/80 
      via-black/50 
      to-transparent">
    </div>

    <!-- 🧩 CONTENT WRAPPER -->
    <div class="absolute inset-0 p-6 md:p-8">

      <!-- 🔝 LEFT TAGLINE -->
      <!--<div class="absolute top-6 left-6 md:left-8">
        <h1 class="text-4xl md:text-5xl font-extrabold leading-tight ">
          YOUR KITS.<br/>
          YOUR STORY.
        </h1>
      </div>-->
      <!-- 🔝 LEFT STACK -->
<div class="absolute top-6 left-6 md:left-8]">

  <!-- TAGLINE -->
  <h1 class="text-4xl md:text-5xl font-extrabold leading-tight mb-3">
    YOUR KITS.<br/>
    YOUR STORY.
  </h1>

  <!-- SUPPORTING -->
  <p class="text-sm leading-relaxed opacity-80">
    Every kit tells a story. Start documenting yours.
  </p>

</div>

      <!-- 🎯 CENTER CONTENT -->
      <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-6">

        <!-- supporting -->
        <p class="text-m leading-tight opacity-85 mb-5 max-w-xs">
          Every kit tells a story.<br/>
          Start documenting yours.
        </p>

        <!-- CTA -->
        <p class="text-m leading-tight">
          Follow us and go to<br/>
          <span class="font-semibold">
            www.footballkitcircle.com
          </span>
        </p>

      </div>

    </div>

    <!-- 📎 HANDLE -->
    <div class="absolute bottom-4 right-4 text-[10px] tracking-wide opacity-60">
      @footballkitcircle
    </div>

  </div>

</body>
</html>
