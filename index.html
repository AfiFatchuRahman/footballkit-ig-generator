<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-serif { font-family: 'Source Serif 4', serif; }
  </style>

  <title>Editorial Layout</title>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

  <!-- 📦 CONTAINER -->
  <div class="relative w-full max-w-md aspect-[4/5] flex flex-col overflow-hidden shadow-2xl bg-white">

    <!-- 📝 TOP TEXT -->
    <section class="bg-[#0f1f1c] px-5 py-6">
      
      <p class="text-[7px] tracking-[0.3em] text-white/60 mb-2 font-bold">
        THE DESIGN
      </p>

      <h1 class="font-serif text-xl leading-tight text-white mb-3">
        Visual Stories Redefined
      </h1>

      <p class="text-xs text-white/70 leading-relaxed max-w-[90%]">
        A modern approach to editorial design through bold typography and immersive imagery.
      </p>

    </section>

    <!-- 🖼️ IMAGE AREA -->
    <section class="relative flex-1 flex overflow-hidden">

      <!-- LEFT BIG -->
      <div class="w-1/2 h-full">
        <img 
          src="https://picsum.photos/600/800?random=1"
          class="w-full h-full object-cover"
          alt=""
        />
      </div>

      <!-- RIGHT GRID -->
      <div class="w-1/2 h-full grid grid-cols-2 grid-rows-3">

        <img src="https://picsum.photos/300/300?random=2" class="w-full h-full object-cover"/>
        <img src="https://picsum.photos/300/300?random=3" class="w-full h-full object-cover"/>

        <img src="https://picsum.photos/300/300?random=4" class="w-full h-full object-cover "/>
        <img src="https://picsum.photos/300/300?random=5" class="w-full h-full object-cover"/>

        <img src="https://picsum.photos/300/300?random=6" class="w-full h-full object-cover "/>
        <img src="https://picsum.photos/300/300?random=7" class="w-full h-full object-cover "/>

      </div>

      <!-- 🔇 MUTE -->
      <div class="absolute bottom-4 right-4 bg-black/30 backdrop-blur-md rounded-full p-2.5 cursor-pointer hover:bg-black/50 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" 
             class="w-4 h-4 text-white" 
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />
        </svg>
      </div>

    </section>

    <!-- 📎 HANDLE -->
    <div class="absolute top-4 right-4 text-white text-[10px] tracking-wide opacity-70 glow-white">
      @footballkitcircle
    </div>

  </div>

</body>
</html>
