<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Poppins', sans-serif; }
  </style>

  <title>Editorial Showcase</title>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- 📦 CONTAINER 4:5 -->
  <div class="relative w-full max-w-md aspect-[4/5] overflow-hidden">

    <!-- 🖼️ MAIN IMAGE -->
    <img 
      src="https://picsum.photos/800/1000"
      class="absolute inset-0 w-full h-full object-cover"
    />

    <!-- 🌑 RADIAL VIGNETTE -->
    <div class="absolute inset-0 
      bg-[radial-gradient(circle_at_25%_25%,rgba(0,0,0,0.4),transparent_60%)]">
    </div>

    <!-- 🌑 CONTROLLED HEIGHT GRADIENT -->
    <!--<div class="absolute bottom-0 left-0 w-full h-[65%] 
      bg-[linear-gradient(to_top,
        rgba(0,0,0,1)_0%,
        rgba(0,0,0,0.95)_20%,
        rgba(0,0,0,0.85)_35%,
        rgba(0,0,0,0.6)_55%,
        rgba(0,0,0,0.3)_75%,
        rgba(0,0,0,0)_100%
      )]">
    </div>-->
<div 
  class="absolute bottom-0 left-0 w-full h-[65%]"
  style="background: linear-gradient(
    to top,
    rgba(0,0,0,1) 0%,
    rgba(0,0,0,0.9) 25%,
    rgba(0,0,0,0.6) 50%,
    rgba(0,0,0,0.3) 70%,
    rgba(0,0,0,0) 100%
  );"
></div>

    <!-- 🖼️ SMALL OVERLAY IMAGE -->
    <div class="absolute top-6 right-6 w-36 h-56 border-2 border-white overflow-hidden shadow-xl">
      <img 
        src="https://picsum.photos/300/400"
        class="w-full h-full object-cover"
      />
    </div>

    <!-- ✍️ TEXT BLOCK -->
    <div class="absolute bottom-0 left-0 p-6 md:p-8 text-white">

      <!-- LABEL -->
      <p class="text-[7px] tracking-[0.3em] opacity-70 mb-2">
        THE SPONSOR SPOTLIGHT
      </p>

      <!-- HEADLINE -->
      <h1 class="font-display font-extrabold text-2xl md:text-2xl leading-tight mb-2">
        ICONIC SPONSOR
      </h1>

      <!-- BODY -->
      <p class="text-sm leading-relaxed max-w-xs opacity-75">
        A closer look at the evolution of football shirt sponsorships and how branding became part of the game’s identity.
      </p>

    </div>
    <div class="absolute top-4 left-4 text-white text-[10px] tracking-wide">
      @footballkitcircle
    </div>
    
  </div>

</body>
</html>
