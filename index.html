<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Kit Editorial Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fff;font-family:sans-serif}

/* HEADER */
.header{
  padding:16px;
  text-align:center;
  font-weight:600;
  border-bottom:1px solid #1a1a1a;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  padding:12px;
  overflow:auto;
}
.controls input, .controls button{
  padding:10px;
  border-radius:8px;
  border:none;
}
.controls input{background:#111;color:#fff}
.controls button{background:#fff;color:#000;font-weight:600}

/* SLIDES */
.container{
  display:flex;
  gap:20px;
  padding:20px;
  overflow-x:auto;
}
.slide{
  width:320px;
  height:320px;
  background:#111;
  border-radius:14px;
  overflow:hidden;
  position:relative;
}

/* SLIDE 1 HERO */
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.hero-title{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:20px;
  font-weight:700;
}

/* SLIDE 2 GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:4px;
  height:100%;
}
.grid div{
  position:relative;
}
.grid img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.grid span{
  position:absolute;
  bottom:5px;
  left:5px;
  font-size:10px;
}

/* SLIDE 3 PLAYER */
.player img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.player span{
  position:absolute;
  bottom:10px;
  left:10px;
}

/* TEXT SLIDES */
.text-slide{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}
.big{
  font-size:28px;
  font-weight:700;
}
.small{
  font-size:14px;
  opacity:.7;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">footballkitcircle</div>

<div class="controls">
  <input id="team" placeholder="Liverpool">
  <input id="year" placeholder="2008">
  <input type="file" id="upload" multiple>
  <button onclick="generate()">Generate</button>
  <button onclick="downloadAll()">Download</button>
</div>

<div class="container" id="slides"></div>

<script>
let images=[];

const dummy=[
  "https://images.unsplash.com/photo-1521417531039-8c1b6b9c1f8d",
  "https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a",
  "https://images.unsplash.com/photo-1508098682722-e99c643e7f0b",
  "https://images.unsplash.com/photo-1522778119026-d647f0596c20"
];

document.getElementById("upload").addEventListener("change",e=>{
  images=[];
  for(let f of e.target.files){
    images.push(URL.createObjectURL(f));
  }
});

function getImgs(){
  return images.length?images:dummy;
}

function slide1(team,year){
  const img=getImgs()[0];
  return `
  <div class="slide hero">
    <img src="${img}">
    <div class="hero-title">${team} ${year}</div>
  </div>`;
}

function slide2(){
  const imgs=getImgs();
  return `
  <div class="slide grid">
    ${imgs.map((i,idx)=>`
      <div>
        <img src="${i}">
        <span>${["Badge","Sponsor","Nameset","Patch"][idx]||"Detail"}</span>
      </div>
    `).join("")}
  </div>`;
}

function slide3(){
  return `
  <div class="slide player">
    <img src="${getImgs()[1]}">
    <span>Key Player</span>
  </div>`;
}

function slideText(title,sub){
  return `
  <div class="slide text-slide">
    <div class="big">${title}</div>
    <div class="small">${sub}</div>
  </div>`;
}

function generate(){
  const team=document.getElementById("team").value||"Liverpool";
  const year=document.getElementById("year").value||"2008";

  const html = [
    slide1(team,year),
    slide2(),
    slide3(),
    slideText("Competitions","EPL • UCL • FA Cup"),
    slideText("Achievements","86 Points • Runner Up"),
    slideText("Fun Facts","Iconic season under Rafa Benitez")
  ].join("");

  document.getElementById("slides").innerHTML=html;
}

function downloadAll(){
  document.querySelectorAll(".slide").forEach((s,i)=>{
    html2canvas(s).then(c=>{
      const a=document.createElement("a");
      a.href=c.toDataURL();
      a.download=`slide-${i+1}.png`;
      a.click();
    });
  });
}
</script>

</body>
</html>
