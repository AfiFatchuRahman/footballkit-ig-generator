<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    .font-serif { font-family: 'Source Serif 4', serif; }
  </style>

  <title>Editorial Ratio Correct</title>
</head>

<body class="bg-white flex items-center justify-center min-h-screen">

  <!-- 📦 4:5 -->
  <div class="w-full max-w-md aspect-[4/5] flex flex-col overflow-hidden shadow-xl">

    <!-- TEXT -->
    <section class="bg-[#fdf1e7] px-6 py-6">
      <p class="text-[10px] tracking-[0.3em] text-gray-600 mb-3">
        THE DESIGN
      </p>

      <h1 class="font-serif text-2xl leading-tight text-[#1a1a1a] mb-3">
        Visual Stories Redefined
      </h1>

      <p class="text-xs text-[#4a4a4a] leading-relaxed">
        A modern approach to editorial design through bold typography and immersive imagery.
      </p>
    </section>

    <!-- DIVIDER -->
    <div class="h-2 bg-[#ff3b00]"></div>

    <!-- IMAGE AREA -->
    <section class="relative flex-1 grid grid-cols-2 overflow-hidden">

      <!-- LEFT -->
      <div class="h-full">
        <img 
          src="https://images.unsplash.com/photo-1520975922284-9e0fef5b67c5?q=80&w=1200"
          class="w-full h-full object-cover"
        />
      </div>

      <!-- RIGHT -->
      <div class="grid grid-cols-2 auto-rows-max content-start">

        <!-- each = ratio 3:4 -->
        <div class="aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7?q=80&w=800" class="w-full h-full object-cover"/>
        </div>

        <div class="aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=800" class="w-full h-full object-cover"/>
        </div>

        <div class="aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a14?q=80&w=800" class="w-full h-full object-cover"/>
        </div>

        <div class="aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd47?q=80&w=800" class="w-full h-full object-cover"/>
        </div>

        <div class="aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800" class="w-full h-full object-cover"/>
        </div>

        <div class="aspect-[3/4]">
          <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=800" class="w-full h-full object-cover"/>
        </div>

      </div>

      <!-- MUTE -->
      <div class="absolute bottom-3 right-3 bg-black/40 backdrop-blur-sm rounded-full p-2">
        <svg xmlns="http://www.w3.org/2000/svg" 
             class="w-4 h-4 text-white opacity-80" 
             fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
            d="M9 9l6 6m0-6l-6 6M15 9v6M9 9v6" />
        </svg>
      </div>

    </section>

  </div>

</body>
</html>
