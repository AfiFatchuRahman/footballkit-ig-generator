<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Kit IG Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0b0b0b;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  padding:16px;
  font-weight:600;
  border-bottom:1px solid #1a1a1a;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:12px;
  flex-wrap:wrap;
}

input{
  background:#111;
  border:1px solid #222;
  color:#fff;
  padding:8px;
  border-radius:8px;
}

button{
  background:#fff;
  color:#000;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

/* SLIDES */
.wrapper{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
  padding:30px;
}

.slide{
  width:320px;
  height:320px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  background:#111;
}

/* HERO IMAGE */
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
}

/* TEXT */
.title{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:22px;
  font-weight:700;
}

.subtitle{
  position:absolute;
  bottom:50px;
  left:20px;
  font-size:12px;
  opacity:.8;
}

/* DETAIL SLIDE */
.detail{
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
}

.detail img{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

.detail-box{
  position:relative;
  z-index:2;
}

.detail-title{
  font-size:18px;
  font-weight:600;
}

.detail-sub{
  font-size:12px;
  opacity:.7;
  margin-top:5px;
}

/* TEXT SLIDE */
.text{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:30px;
}

.big{
  font-size:28px;
  font-weight:700;
}

.small{
  margin-top:10px;
  opacity:.7;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">footballkitcircle</div>

<div class="controls">
  <input id="team" placeholder="Liverpool">
  <input id="year" placeholder="2008">
  <input type="file" id="upload">
  <button onclick="generate()">Generate</button>
  <button onclick="downloadAll()">Download</button>
</div>

<div class="wrapper" id="slides"></div>

<script>
let image=null;

const dummy="https://images.unsplash.com/photo-1508098682722-e99c643e7f0b";

document.getElementById("upload").addEventListener("change",e=>{
  image=URL.createObjectURL(e.target.files[0]);
});

function getImg(){
  return image||dummy;
}

/* SLIDES */

function slide1(team,year){
  return `
  <div class="slide hero">
    <img src="${getImg()}">
    <div class="overlay"></div>
    <div class="subtitle">Home Kit</div>
    <div class="title">${team} ${year}</div>
  </div>`;
}

function slide2(){
  return `
  <div class="slide detail">
    <img src="${getImg()}">
    <div class="overlay"></div>
    <div class="detail-box">
      <div class="detail-title">Jersey Details</div>
      <div class="detail-sub">Badge • Sponsor • Nameset • Patch</div>
    </div>
  </div>`;
}

function slide3(){
  return `
  <div class="slide detail">
    <img src="${getImg()}">
    <div class="overlay"></div>
    <div class="detail-box">
      <div class="detail-title">Players</div>
      <div class="detail-sub">Gerrard • Torres • Alonso</div>
    </div>
  </div>`;
}

function slideText(title,sub){
  return `
  <div class="slide text">
    <div class="big">${title}</div>
    <div class="small">${sub}</div>
  </div>`;
}

function generate(){
  const team=document.getElementById("team").value||"Liverpool";
  const year=document.getElementById("year").value||"2008";

  document.getElementById("slides").innerHTML=`
    ${slide1(team,year)}
    ${slide2()}
    ${slide3()}
    ${slideText("Competitions","Premier League • UCL • FA Cup")}
    ${slideText("Achievements","86 Points • Runner Up")}
    ${slideText("Fun Facts","Iconic Benitez era")}
  `;
}

function downloadAll(){
  document.querySelectorAll(".slide").forEach((s,i)=>{
    html2canvas(s).then(c=>{
      const a=document.createElement("a");
      a.href=c.toDataURL();
      a.download=`slide-${i+1}.png`;
      a.click();
    });
  });
}
</script>

</body>
</html>
