<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Kit Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #0f0f0f;
  color: #fff;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header {
  padding: 20px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

/* CONTROLS */
.controls {
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  max-width: 500px;
  margin: auto;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

input {
  background: #1a1a1a;
  color: white;
}

button {
  background: #c40000;
  color: white;
  cursor: pointer;
}

/* SLIDES */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 15px;
  padding: 20px;
}

.slide {
  aspect-ratio: 1/1;
  background: linear-gradient(135deg, #8B0000, #c40000);
  position: relative;
  overflow: hidden;
  border-radius: 12px;
}

/* IMAGE */
.img-wrap {
  position: absolute;
}

.img-wrap img {
  width: 100%;
  display: block;
  border-radius: 6px;
}

.caption {
  position: absolute;
  bottom: -20px;
  left: 0;
  font-size: 10px;
  opacity: 0.8;
}

/* TEXT */
.title {
  position: absolute;
  bottom: 15px;
  left: 15px;
  font-size: 16px;
  font-weight: bold;
}

.subtitle {
  position: absolute;
  top: 10px;
  left: 15px;
  font-size: 11px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="header">Football Kit Generator</div>

<div class="controls">
  <input id="team" placeholder="Team (Liverpool)">
  <input id="year" placeholder="Year (2008)">
  <input type="file" id="upload" multiple>
  <button onclick="generate()">Generate</button>
  <button onclick="downloadAll()">Download</button>
</div>

<div class="container" id="slides"></div>

<script>
let images = [];

// Dummy + caption
const dummyData = [
  {src:"https://images.unsplash.com/photo-1521417531039-8c1b6b9c1f8d", cap:"Badge"},
  {src:"https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a", cap:"Sponsor"},
  {src:"https://images.unsplash.com/photo-1508098682722-e99c643e7f0b", cap:"Player"},
  {src:"https://images.unsplash.com/photo-1522778119026-d647f0596c20", cap:"Match"},
  {src:"https://images.unsplash.com/photo-1517649763962-0c623066013b", cap:"Detail"}
];

document.getElementById("upload").addEventListener("change", function(e){
  images = [];
  for (let file of e.target.files) {
    images.push({
      src: URL.createObjectURL(file),
      cap: "Custom"
    });
  }
});

function random(min,max){
  return Math.random()*(max-min)+min;
}

function createImage(item){
  const wrap = document.createElement("div");
  wrap.className = "img-wrap";

  wrap.style.width = random(80,160)+"px";
  wrap.style.top = random(0,220)+"px";
  wrap.style.left = random(0,220)+"px";
  wrap.style.transform = `rotate(${random(-10,10)}deg)`;

  const img = document.createElement("img");
  img.src = item.src;

  const cap = document.createElement("div");
  cap.className = "caption";
  cap.innerText = item.cap;

  wrap.appendChild(img);
  wrap.appendChild(cap);

  return wrap;
}

function createSlide(titleText, subtitleText){
  const div = document.createElement("div");
  div.className = "slide";

  const used = images.length ? images : dummyData;

  used.slice(0,4).forEach(item=>{
    div.appendChild(createImage(item));
  });

  const title = document.createElement("div");
  title.className = "title";
  title.innerText = titleText;

  const sub = document.createElement("div");
  sub.className = "subtitle";
  sub.innerText = subtitleText;

  div.appendChild(title);
  div.appendChild(sub);

  return div;
}

function generate(){
  const team = document.getElementById("team").value || "Liverpool";
  const year = document.getElementById("year").value || "2008";

  const container = document.getElementById("slides");
  container.innerHTML = "";

  const slides = [
    [`${team} ${year}`, "Home Kit"],
    ["Jersey Details", "Badge • Sponsor • Nameset"],
    ["Players", "Key Squad"],
    ["Competitions", "EPL • UCL"],
    ["Achievements", "Season Result"],
    ["Fun Facts", "Did You Know?"]
  ];

  slides.forEach(s=>{
    container.appendChild(createSlide(s[0], s[1]));
  });
}

function downloadAll(){
  const slides = document.querySelectorAll(".slide");

  slides.forEach((slide,i)=>{
    html2canvas(slide).then(canvas=>{
      const link = document.createElement("a");
      link.download = `slide-${i+1}.png`;
      link.href = canvas.toDataURL();
      link.click();
    });
  });
}
</script>

</body>
</html>
