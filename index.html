<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    /* subtle grain */
    .grain::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/noise.png");
      opacity: 0.06;
      pointer-events: none;
    }

    /* subtle glow */
    .glow {
      text-shadow: 0 0 10px rgba(255,255,255,0.15);
    }
  </style>

  <title>CTA Slide</title>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- 📦 CONTAINER 4:5 -->
  <div class="relative w-full max-w-md aspect-[4/5] overflow-hidden bg-black text-white grain">

    <!-- 🌑 BACKGROUND GRADIENT -->
    <div class="absolute inset-0 
      bg-gradient-to-t 
      from-black 
      via-black/90 
      via-black/70 
      to-black">
    </div>

    <!-- ✍️ CONTENT -->
    <div class="relative z-10 flex flex-col items-center justify-center h-full text-center px-8">

      <!-- LABEL (optional subtle) -->
      <p class="text-[10px] tracking-[0.3em] opacity-50 mb-6">
        CONTINUE THE STORY
      </p>

      <!-- TAGLINE -->
      <h1 class="text-2xl md:text-3xl font-extrabold leading-tight mb-6 glow">
        YOUR KITS.<br/>
        YOUR STORY.
      </h1>

      <!-- SUPPORTING TEXT -->
      <p class="text-sm md:text-base leading-relaxed opacity-80 mb-10 max-w-xs">
        Every kit tells a story.<br/>
        Start documenting yours.
      </p>

      <!-- CTA -->
      <div class="text-sm tracking-wide opacity-90">
        EXPLORE →
      </div>

    </div>

    <!-- 📎 HANDLE -->
    <div class="absolute bottom-4 right-4 text-[10px] tracking-wide opacity-60">
      @footballkitcircle
    </div>

  </div>

</body>
</html>
