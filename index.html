<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    /* Grain / Noise effect */
    .noise::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("https://grainy-gradients.vercel.app/noise.svg");
      opacity: 0.15;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* Hexagon frame lines */
    .hex-frame::before,
    .hex-frame::after {
      content: "";
      position: absolute;
      border: 1px solid #c59d5f;
      width: 120%;
      height: 120%;
      top: -10%;
      left: -10%;
      clip-path: polygon(
        25% 0%, 75% 0%, 
        100% 50%, 
        75% 100%, 25% 100%, 
        0% 50%
      );
      pointer-events: none;
    }

    /* Decorative angled lines */
    .corner-line-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 120px;
      height: 1px;
      background: #c59d5f;
      transform: rotate(25deg);
      transform-origin: left;
    }

    .corner-line-bottom {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 120px;
      height: 1px;
      background: #c59d5f;
      transform: rotate(25deg);
      transform-origin: right;
    }
  </style>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- Container 4:5 -->
  <div class="relative w-[360px] aspect-[4/5] overflow-hidden rounded-xl noise">

    <!-- Background Image -->
    <img 
      src="https://images.unsplash.com/photo-1606813909023-3b8d0c1d6c1f" 
      class="absolute inset-0 w-full h-full object-cover"
    />

    <!-- Gradient Overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>

    <!-- Hex Frame -->
    <div class="absolute inset-0 hex-frame"></div>

    <!-- Decorative Lines -->
    <div class="corner-line-top"></div>
    <div class="corner-line-bottom"></div>

    <!-- Top Left Hex Icon -->
    <div class="absolute top-4 left-4 w-10 h-10 border border-[#c59d5f] flex items-center justify-center"
      style="clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%)">
      <span class="text-white text-xs">⚽</span>
    </div>

    <!-- Slide Indicator -->
    <div class="absolute top-4 right-4 bg-black/50 text-white text-xs px-3 py-1 rounded-full">
      1/9
    </div>

    <!-- Content -->
    <div class="absolute bottom-0 p-6 text-white">

      <!-- Category -->
      <p class="text-xs tracking-[0.3em] text-gray-300 mb-2">
        HISTORY
      </p>

      <!-- Headline -->
      <h1 class="font-serif text-3xl leading-tight font-bold">
        Liverpool Home Kit 2008<br/>
        The Return of Simplicity
      </h1>

    </div>

    <!-- Footer -->
    <div class="absolute bottom-3 left-0 right-0 text-center text-white font-bold">
      UltraBall
    </div>

    <!-- Mute Icon -->
    <div class="absolute bottom-4 right-4 text-white text-lg">
      🔇
    </div>

  </div>

</body>
</html>
