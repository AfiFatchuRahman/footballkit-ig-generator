<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Football Kit Generator</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0b0b;
  color:#fff;
}

/* HEADER */
.header{
  padding:20px;
  font-weight:600;
  font-size:18px;
  text-align:center;
  border-bottom:1px solid #1a1a1a;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  padding:15px;
  overflow:auto;
}

.controls input{
  background:#111;
  border:1px solid #222;
  color:#fff;
  padding:10px;
  border-radius:8px;
  min-width:120px;
}

.controls button{
  background:#fff;
  color:#000;
  border:none;
  padding:10px 16px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}

/* SLIDES GRID */
.container{
  display:flex;
  gap:20px;
  padding:20px;
  overflow-x:auto;
}

.slide{
  min-width:320px;
  height:320px;
  background:#111;
  border-radius:16px;
  position:relative;
  overflow:hidden;
}

/* HERO IMAGE */
.hero{
  position:absolute;
  width:75%;
  top:20px;
  left:20px;
  transform:rotate(-3deg);
}

/* SMALL STACK */
.stack{
  position:absolute;
  bottom:60px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.stack img{
  width:80px;
  border-radius:6px;
}

/* CAPTION */
.caption{
  font-size:10px;
  opacity:.7;
  margin-top:2px;
}

/* TEXT */
.title{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:18px;
  font-weight:600;
}

.sub{
  position:absolute;
  top:15px;
  left:20px;
  font-size:11px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="header">footballkitcircle</div>

<div class="controls">
  <input id="team" placeholder="Liverpool">
  <input id="year" placeholder="2008">
  <input type="file" id="upload" multiple>
  <button onclick="generate()">Generate</button>
  <button onclick="downloadAll()">Download</button>
</div>

<div class="container" id="slides"></div>

<script>
let images = [];

// Dummy data (with caption)
const dummy = [
  {src:"https://images.unsplash.com/photo-1521417531039-8c1b6b9c1f8d",cap:"Badge"},
  {src:"https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a",cap:"Sponsor"},
  {src:"https://images.unsplash.com/photo-1508098682722-e99c643e7f0b",cap:"Player"},
  {src:"https://images.unsplash.com/photo-1522778119026-d647f0596c20",cap:"Match"}
];

document.getElementById("upload").addEventListener("change",e=>{
  images=[];
  for(let file of e.target.files){
    images.push({src:URL.createObjectURL(file),cap:"Custom"});
  }
});

function createSlide(title,sub){
  const used = images.length?images:dummy;

  const div=document.createElement("div");
  div.className="slide";

  // HERO
  const hero=document.createElement("img");
  hero.className="hero";
  hero.src=used[0].src;

  // STACK
  const stack=document.createElement("div");
  stack.className="stack";

  used.slice(1,4).forEach(i=>{
    const wrap=document.createElement("div");

    const img=document.createElement("img");
    img.src=i.src;

    const cap=document.createElement("div");
    cap.className="caption";
    cap.innerText=i.cap;

    wrap.appendChild(img);
    wrap.appendChild(cap);
    stack.appendChild(wrap);
  });

  const t=document.createElement("div");
  t.className="title";
  t.innerText=title;

  const s=document.createElement("div");
  s.className="sub";
  s.innerText=sub;

  div.appendChild(hero);
  div.appendChild(stack);
  div.appendChild(t);
  div.appendChild(s);

  return div;
}

function generate(){
  const team=document.getElementById("team").value||"Liverpool";
  const year=document.getElementById("year").value||"2008";

  const data=[
    [`${team} ${year}`,"Home Kit"],
    ["Jersey Details","Breakdown"],
    ["Players","Squad"],
    ["Competitions","Matches"],
    ["Achievements","Season"],
    ["Fun Facts","Extra"]
  ];

  const container=document.getElementById("slides");
  container.innerHTML="";

  data.forEach(d=>{
    container.appendChild(createSlide(d[0],d[1]));
  });
}

function downloadAll(){
  document.querySelectorAll(".slide").forEach((s,i)=>{
    html2canvas(s).then(c=>{
      const a=document.createElement("a");
      a.href=c.toDataURL();
      a.download=`slide-${i+1}.png`;
      a.click();
    });
  });
}
</script>

</body>
</html>
