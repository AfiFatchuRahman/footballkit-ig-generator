<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }

    /* grain */
    .grain::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image: url("https://www.transparenttextures.com/patterns/noise.png");
      opacity: 0.06;
      pointer-events: none;
    }
  </style>

  <title>CTA Slide</title>
</head>

<body class="bg-black flex items-center justify-center min-h-screen">

  <!-- 📦 CONTAINER 4:5 -->
  <div class="relative w-full max-w-md aspect-[4/5] overflow-hidden text-white grain">

    <!-- 🖼️ BACKGROUND IMAGE -->
    <img 
      src="https://picsum.photos/800/1000?grayscale"
      class="absolute inset-0 w-full h-full object-cover"
    />

    <!-- 🌑 STRONG BOTTOM GRADIENT -->
    <div class="absolute bottom-0 left-0 w-full h-[65%] 
      bg-gradient-to-t 
      from-black 
      via-black/80 
      via-black/50 
      to-transparent">
    </div>

    <!-- ✍️ CONTENT -->
    <div class="absolute inset-0 flex flex-col justify-between p-6 md:p-8">

      <!-- 🔝 TAGLINE -->
      <div>
        <h1 class="text-2xl md:text-3xl font-extrabold leading-tight">
          YOUR KITS.<br/>
          YOUR STORY.
        </h1>
      </div>

      <!-- 🔻 BOTTOM TEXT -->
      <div>

        <!-- supporting -->
        <p class="text-sm leading-relaxed opacity-80 mb-6 max-w-xs">
          Every kit tells a story.<br/>
          Start documenting yours.
        </p>

        <!-- CTA -->
        <p class="text-sm tracking-wide leading-relaxed">
          Follow us and go to<br/>
          <span class="font-semibold">
            www.footballkitcircle.com
          </span>
        </p>

      </div>

    </div>

    <!-- 📎 HANDLE -->
    <div class="absolute bottom-4 right-4 text-[10px] tracking-wide opacity-60">
      @footballkitcircle
    </div>

  </div>

</body>
</html>
